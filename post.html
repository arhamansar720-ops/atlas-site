<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Blog</title>
<link rel="stylesheet" href="style.css">
<style>
  .post-wrap{ padding: 50px 0 80px; max-width:680px; margin:0 auto; }
  .back-link{ font-size:0.85rem; font-weight:600; color:var(--aqua-3); display:inline-block; margin-bottom:24px; }
  .post-wrap h1{ font-size:2.4rem; line-height:1.15; margin-bottom:14px; }
  .post-meta{ display:flex; gap:10px; align-items:center; margin-bottom:34px; }
  .post-meta .tags{ display:flex; gap:6px; }
  .tag-chip{
    font-size:0.72rem; font-weight:700; padding:3px 10px; border-radius:999px;
    background: linear-gradient(180deg,#fff,#E7ECF1); border:1px solid var(--line); color:var(--aqua-3);
  }
  .post-body{ font-size:1.05rem; }
  .post-body p{ color:var(--ink); margin-bottom:1.3em; }
  .post-body .code-block{ margin: 1.5em 0; }
  .not-found{ text-align:center; padding:80px 0; }
</style>
</head>
<body>

<div class="dock-wrap">
  <nav class="dock">
    <div class="dock-brand"><span class="dock-orb"></span> Atlas</div>
    <a class="dock-link" href="index.html">Home</a>
    <a class="dock-link" href="blog.html">Blog</a>
    <a class="dock-link" href="downloads.html">Downloads</a>
  </nav>
</div>

<div class="container">
  <div class="post-wrap" id="post-wrap">
    <!-- filled by script -->
  </div>
</div>

<footer>Atlas is an independent project. Built one keyword at a time. &copy; 2026.</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
  (async () => {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const post = await getPostById(id);
    const wrap = document.getElementById('post-wrap');

    if(!post){
      wrap.innerHTML = `<div class="not-found"><h1>Post not found</h1><p>It may have been removed.</p><a href="blog.html" class="btn btn-aqua"><span class="sweep"></span>Back to blog</a></div>`;
    } else {
      const paragraphs = post.body.split(/\n\n+/).map(block => {
        if(block.trim().startsWith('<pre')) return block;
        return `<p>${block.replace(/\n/g,'<br>')}</p>`;
      }).join("\n");

      wrap.innerHTML = `
        <a href="blog.html" class="back-link">← Back to blog</a>
        <h1>${post.title}</h1>
        <div class="post-meta">
          <span class="eyebrow" style="margin:0;">${fmtDate(post.date)}</span>
          <div class="tags">${post.tags.map(t=>`<span class="tag-chip">${t}</span>`).join("")}</div>
        </div>
        <div class="post-body">${paragraphs}</div>
      `;
      document.title = post.title + " — Atlas";
    }
  })();
</script>
</body>
</html>
